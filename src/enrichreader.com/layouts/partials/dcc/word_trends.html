<!-- [05] Word Cloud & Pronoun Breakdown -->
<section id="word-trends" class="chart-section" style="padding-block: clamp(6rem, 10vw, 10rem); background: rgba(0,0,0,0.15);">
  <div class="max-w-5xl mx-auto px-6 fade-in-up">
    <div class="section-header mb-16">
      <h2 class="section-title">Keywords &amp; <br><em>demographics</em></h2>
      <p class="section-subtitle">
        Explore the keywords that define the crawl, alongside a clear demographic breakdown of character pronouns.
      </p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-stretch">
      <!-- Word Cloud Card (7-cols) -->
      <div class="lg:col-span-7">
        <div class="chart-card p-8 md:p-12 flex flex-col justify-between h-full">
          <div class="flex justify-between items-center mb-6">
            <span class="control-label">Crawl Keyword Map (Categorized Colors)</span>
          </div>
          <div id="wordCloud" class="word-cloud-container flex-1 min-h-[320px]">
            <!-- Dynamically populated with safe elements -->
          </div>
        </div>
      </div>

      <!-- Pronouns (5-cols) -->
      <div class="lg:col-span-5">
        <div class="chart-card p-8 flex flex-col justify-between h-full">
          <div>
            <span class="control-label mb-6 block">Character Pronouns Distribution</span>
            <div class="relative w-full max-w-[200px] aspect-square mx-auto mb-8 flex items-center justify-center">
              <!-- Center Total Display -->
              <div class="absolute inset-0 flex flex-col items-center justify-center text-center z-10 pointer-events-none">
                <span id="pronoun-total-count" class="donut-total-value" style="font-size: clamp(2rem, 3.5vw, 2.5rem);">317</span>
                <span class="donut-total-label" style="font-size: 8px;">characters</span>
              </div>
              <canvas id="pronounsDonutChart"></canvas>
            </div>
          </div>
          
          <div class="border-t border-white/5 pt-6">
            <div class="overflow-x-auto">
              <table class="w-full text-left text-xs text-neutral-400 font-ui" id="pronouns-table" style="border-collapse: collapse; width: 100%;">
                <thead>
                  <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                    <th style="padding-bottom: 8px;">Pronoun</th>
                    <th style="padding-bottom: 8px; text-align: right;">Mentions</th>
                    <th style="padding-bottom: 8px; text-align: right;">Share</th>
                  </tr>
                </thead>
                <tbody id="pronouns-table-body">
                  <!-- Dynamically populated -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
