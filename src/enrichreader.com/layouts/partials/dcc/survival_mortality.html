<!-- [03] Survival Curve & Mortality Feed -->
<section id="character-mortality" class="chart-section" style="padding-block: clamp(6rem, 10vw, 10rem);">
  <div class="max-w-5xl mx-auto px-6 fade-in-up">
    <div class="section-header mb-12">
      <h2 class="section-title">Series survival rate, <br><em>over the timeline</em></h2>
      <p class="section-subtitle">
        LitRPGs are brutal. Track the survival curve of characters introduced across the series. Watch the cumulative deaths increase as floors get more difficult.
      </p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
      <!-- Survival Line Chart (12-cols) -->
      <div class="lg:col-span-12">
        <div class="chart-card p-8 md:p-12">
          <div class="flex justify-between items-center mb-6">
            <span class="control-label">Series Survival Curve (All Volumes)</span>
            <div class="flex gap-4">
              <span class="legend-item-minimal">
                <span class="dot-marker" style="background: var(--color-person)"></span>
                <span class="legend-label" style="color: var(--color-person)">Alive</span>
              </span>
              <span class="legend-item-minimal">
                <span class="dot-marker" style="background: var(--color-lore)"></span>
                <span class="legend-label" style="color: var(--color-lore)">Dead</span>
              </span>
            </div>
          </div>
          
          <div class="chart-container" style="height: 350px;">
            <canvas id="survivalChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
